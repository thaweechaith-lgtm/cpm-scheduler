<head>
<meta charset="UTF-8">

<title>CPM Mobile</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#F4F6F9;--bg1:#fff;--bg2:#F8FAFB;--bg4:#EDF1F5;
  --line:#DDE3EA;--line2:#C8D2DC;
  --accent:#1468B3;--accent2:#0891B2;--green:#16A34A;--red:#DC2626;
  --gold:#D97706;--amber:#EA580C;
  --txt:#0F172A;--txt2:#334155;--txt3:#64748B;
  --mono:'DM Mono',monospace;--sans:'Sarabun',sans-serif;
  --h:56px; /* topbar height */
}
html,body{height:100%;overflow:hidden;background:var(--bg0);font-family:var(--sans);font-size:14px;color:var(--txt)}

/* ── Topbar ── */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--h);
  background:var(--accent);color:#fff;
  display:flex;align-items:center;gap:10px;padding:0 14px;
  z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.logo-badge-m{
  width:34px;height:34px;border-radius:50%;
  background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.5);
  font-family:var(--mono);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:#fff;
  flex-shrink:0;
}
#topbar .proj{font-size:12px;opacity:.9;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#topbar .date-badge{font-family:var(--mono);font-size:10px;background:rgba(255,255,255,.15);border-radius:4px;padding:3px 8px;white-space:nowrap;flex-shrink:0}
#btn-sync{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;flex-shrink:0;font-family:var(--mono)}
#btn-sync:active{background:rgba(255,255,255,.3)}

/* ── Bottom nav ── */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg1);border-top:1px solid var(--line2);
  display:flex;height:56px;z-index:100;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:transparent;
  font-family:var(--sans);font-size:10px;color:var(--txt3);padding:4px;
  transition:color .15s;
}
.nav-btn.active{color:var(--accent)}
.nav-btn .icon{font-size:20px;line-height:1}

/* ── Main content ── */
#main{
  position:fixed;top:var(--h);bottom:56px;left:0;right:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
}
.page{display:none;padding:12px}
.page.active{display:block}

/* ── Cards ── */
.card{background:var(--bg1);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.section-hd{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 6px}

/* ── KPI grid ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi-box{background:var(--bg1);border:1px solid var(--line);border-radius:8px;padding:12px;display:flex;flex-direction:column;gap:2px}
.kpi-box .kl{font-family:var(--mono);font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px}
.kpi-box .kv{font-size:22px;font-weight:700;color:var(--txt);line-height:1.1}
.kpi-box.accent{border-left:3px solid var(--accent)}
.kpi-box.red{border-left:3px solid var(--red)}
.kpi-box.green{border-left:3px solid var(--green)}
.kpi-box.gold{border-left:3px solid var(--gold)}

/* ── Task list ── */
.task-item{
  background:var(--bg1);border:1px solid var(--line);border-radius:8px;
  padding:12px;margin-bottom:8px;
  display:flex;flex-direction:column;gap:6px;
}
.task-item.lv1{border-left:4px solid var(--accent);background:#EDF4FB}
.task-item.lv2{border-left:3px solid var(--accent2)}
.task-item.crit{border-left:4px solid var(--red)}
.task-name{font-size:13px;font-weight:600;color:var(--txt)}
.task-name.crit{color:var(--red)}
.task-meta{display:flex;gap:8px;flex-wrap:wrap;font-family:var(--mono);font-size:10px;color:var(--txt3)}
.task-dates{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-family:var(--mono);font-size:10px}
.task-dates .dl{display:flex;flex-direction:column;gap:1px}
.task-dates .dl .lb{font-size:9px;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.task-dates .dl .vl{color:var(--txt2);font-weight:500}
.pct-bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:2px}
.pct-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .4s}

/* ── Edit panel ── */
.field-row{margin-bottom:12px}
.field-row label{display:block;font-family:var(--mono);font-size:10px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.field-row input,.field-row select{
  width:100%;background:var(--bg1);border:1px solid var(--line2);
  color:var(--txt);font-family:var(--mono);font-size:13px;
  padding:9px 12px;border-radius:6px;outline:none;
}
.field-row input:focus,.field-row select:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;width:100%;font-size:14px;font-family:var(--sans);font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-secondary{background:var(--bg4);color:var(--txt2);border:1px solid var(--line2);border-radius:8px;padding:10px;width:100%;font-size:13px;font-family:var(--sans);cursor:pointer;margin-bottom:8px}
.btn-danger{background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.2);border-radius:8px;padding:10px;width:100%;font-size:13px;font-family:var(--sans);cursor:pointer}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px}
.badge.green{background:rgba(22,163,74,.12);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.badge.red{background:rgba(220,38,38,.12);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.badge.blue{background:rgba(20,104,179,.12);color:var(--accent);border:1px solid rgba(20,104,179,.2)}
.badge.grey{background:rgba(100,116,139,.1);color:var(--txt3);border:1px solid var(--line)}
.badge.amber{background:rgba(234,88,12,.1);color:var(--amber);border:1px solid rgba(234,88,12,.2)}
.badge.crit{background:rgba(220,38,38,.15);color:var(--red);border:1px solid rgba(220,38,38,.3);font-weight:700}

/* ── Cloud modal ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-end}
.overlay.open{display:flex}
.sheet{background:var(--bg1);border-radius:16px 16px 0 0;padding:20px;width:100%;max-height:85vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--line2);border-radius:2px;margin:0 auto 16px}
.sheet h3{font-size:16px;font-weight:700;margin-bottom:16px}

/* ── Toast ── */
#toast-m{position:fixed;bottom:70px;left:12px;right:12px;z-index:999;background:var(--txt);color:#fff;font-family:var(--mono);font-size:12px;padding:12px 16px;border-radius:8px;transform:translateY(100px);opacity:0;transition:all .25s;pointer-events:none;text-align:center}
#toast-m.show{transform:translateY(0);opacity:1}
#toast-m.success{background:var(--green)}
#toast-m.error{background:var(--red)}

/* ── Progress ring ── */
.ring-wrap{display:flex;align-items:center;justify-content:center;padding:16px 0}
svg.ring{transform:rotate(-90deg)}
.ring-track{fill:none;stroke:var(--line);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.ring-label{font-size:22px;font-weight:700;text-anchor:middle;dominant-baseline:middle;fill:var(--txt)}
.ring-sub{font-size:10px;text-anchor:middle;fill:var(--txt3);dominant-baseline:middle}

/* ── Filter tabs ── */
.filter-tabs{display:flex;gap:6px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px}
.ftab{background:var(--bg4);border:1px solid var(--line);border-radius:20px;padding:5px 14px;font-size:11px;font-family:var(--mono);color:var(--txt3);white-space:nowrap;cursor:pointer;flex-shrink:0}
.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── CP strip ── */
.cp-strip{background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.2);border-radius:8px;padding:10px 12px;margin-bottom:10px;font-family:var(--mono);font-size:10px;color:var(--txt3);line-height:1.9}
.cp-strip strong{color:var(--red);display:block;margin-bottom:2px;font-size:9px;text-transform:uppercase;letter-spacing:.6px}
</style>

<body>

<!-- Topbar -->
<div id="topbar">
  <div class="logo-badge-m">CPM</div>
  <div class="proj" id="m-proj">No project</div>
  <div class="date-badge" id="m-date">DD: —</div>
  <button id="btn-sync" onclick="openCloudSheet()">☁</button>
</div>

<!-- Main -->
<div id="main">

  <!-- Dashboard page -->
  <div class="page active" id="page-dash">
    <div class="kpi-grid" id="m-kpi"></div>
    <div class="cp-strip" id="m-cp"><strong>★ Critical Path</strong>Run CPM first</div>
    <div class="section-hd">Progress</div>
    <div class="card" style="display:flex;align-items:center;gap:16px" id="m-progress-card">
      <div class="ring-wrap" id="m-ring-wrap">
        <svg class="ring" width="100" height="100" viewBox="0 0 100 100">
          <circle class="ring-track" cx="50" cy="50" r="41"/>
          <circle class="ring-fill" id="m-ring-fill" cx="50" cy="50" r="41" stroke="var(--accent)"
            stroke-dasharray="257.6" stroke-dashoffset="257.6"/>
          <text class="ring-label" x="50" y="47" transform="rotate(90,50,50)" id="m-ring-pct">0%</text>
          <text class="ring-sub" x="50" y="60" transform="rotate(90,50,50)">Actual</text>
        </svg>
      </div>
      <div style="flex:1;font-family:var(--mono);font-size:11px;display:flex;flex-direction:column;gap:8px" id="m-progress-detail"></div>
    </div>
    <div class="section-hd">Phase Summary</div>
    <div id="m-phase-list"></div>
  </div>

  <!-- Tasks page -->
  <div class="page" id="page-tasks">
    <div class="filter-tabs">
      <div class="ftab active" onclick="mFilterTasks('all',this)">All</div>
      <div class="ftab" onclick="mFilterTasks('critical',this)">★ Critical</div>
      <div class="ftab" onclick="mFilterTasks('inprog',this)">In Progress</div>
      <div class="ftab" onclick="mFilterTasks('delayed',this)">Delayed</div>
      <div class="ftab" onclick="mFilterTasks('notstarted',this)">Not Started</div>
    </div>
    <div id="m-task-list"></div>
  </div>

  <!-- Edit page -->
  <div class="page" id="page-edit">
    <div class="card">
      <div style="font-family:var(--mono);font-size:11px;color:var(--txt3);margin-bottom:12px" id="edit-title">เลือกงานจากหน้า Tasks</div>
      <div class="field-row">
        <label>% Complete</label>
        <input type="number" id="e-pct" min="0" max="100" placeholder="0–100">
      </div>
      <div class="field-row">
        <label>Actual Start (MM/DD/YYYY)</label>
        <input type="text" id="e-as" placeholder="MM/DD/YYYY">
      </div>
      <div class="field-row">
        <label>Actual Finish (MM/DD/YYYY)</label>
        <input type="text" id="e-af" placeholder="MM/DD/YYYY">
      </div>
      <div class="field-row">
        <label>Status</label>
        <select id="e-status">
          <option value="Not Started">Not Started</option>
          <option value="In Progress">In Progress</option>
          <option value="Complete">Complete</option>
        </select>
      </div>
      <button class="btn-primary" onclick="saveEdit()">💾 Save & Sync</button>
      <button class="btn-secondary" onclick="cancelEdit()">ยกเลิก</button>
    </div>

    <div class="section-hd" id="edit-bl-hd" style="display:none">Baseline Info</div>
    <div class="card" id="edit-bl-card" style="display:none;font-family:var(--mono);font-size:11px;color:var(--txt2);line-height:2"></div>
  </div>

  <!-- Settings page -->
  <div class="page" id="page-settings">
    <div class="section-hd">Firebase Cloud Sync</div>
    <div class="card">
      <div id="m-cloud-status" style="font-family:var(--mono);font-size:11px;color:var(--txt3);margin-bottom:12px">ยังไม่ได้เชื่อมต่อ</div>
      <button class="btn-primary" onclick="openCloudSheet()">☁ ตั้งค่า Firebase</button>
    </div>
    <div class="section-hd">Project Info</div>
    <div class="card" id="m-proj-info" style="font-family:var(--mono);font-size:11px;color:var(--txt2);line-height:2">—</div>
    <div class="section-hd">วันที่ตั้งค่า</div>
    <div class="card">
      <div class="field-row">
        <label>Data Date (MM/DD/YYYY)</label>
        <input type="text" id="m-datadate-input" placeholder="MM/DD/YYYY">
      </div>
      <button class="btn-primary" onclick="updateDataDate()">อัพเดต Data Date</button>
    </div>
  </div>

</div>

<!-- Bottom nav -->
<div id="bottomnav">
  <button class="nav-btn active" onclick="showPage('dash',this)">
    <span class="icon">📊</span>Dashboard
  </button>
  <button class="nav-btn" onclick="showPage('tasks',this)">
    <span class="icon">📋</span>Tasks
  </button>
  <button class="nav-btn" onclick="showPage('edit',this)">
    <span class="icon">✏️</span>Edit
  </button>
  <button class="nav-btn" onclick="showPage('settings',this)">
    <span class="icon">⚙️</span>Settings
  </button>
</div>

<!-- Cloud bottom sheet -->
<div class="overlay" id="cloud-overlay" onclick="if(event.target===this)closeCloudSheet()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>☁ Firebase Cloud Sync</h3>
    <div class="field-row"><label>API Key</label><input id="fb-apiKey" type="text" placeholder="AIzaSy..."></div>
    <div class="field-row"><label>Auth Domain</label><input id="fb-authDomain" type="text" placeholder="xxx.firebaseapp.com"></div>
    <div class="field-row"><label>Database URL ★</label><input id="fb-dbUrl" type="text" placeholder="https://xxx-default-rtdb.firebaseio.com"></div>
    <div class="field-row"><label>Project ID</label><input id="fb-projId" type="text" placeholder="my-project"></div>
    <div class="field-row"><label>Sync ID (ชื่อห้อง)</label><input id="fb-syncId" type="text" placeholder="egat-bb2-substation"></div>
    <button class="btn-primary" onclick="fbConnectMobile()">🔌 Connect & Pull</button>
    <button class="btn-secondary" onclick="closeCloudSheet()">ปิด</button>
    <div id="cloud-sheet-status" style="font-family:var(--mono);font-size:10px;color:var(--txt3);text-align:center;padding-top:8px"></div>
  </div>
</div>

<div id="toast-m"></div>

<script>
// ══════════════════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════════════════
let MS = {

  baselines: [],
  activeBL: -1,
  results: null,
  editIdx: -1,
  taskFilter: 'all'
};

// ══════════════════════════════════════════════════════════════════════════════
// DATE UTILS (same as desktop)
// ══════════════════════════════════════════════════════════════════════════════
function getWdays(){ return parseInt(MS.settings.wdays)||5; }
function isWD(d){ const w=getWdays(); if(w===7)return true; if(w===6)return d.getDay()>=1&&d.getDay()<=6; return d.getDay()>=1&&d.getDay()<=5; }
function addWD(base,n){ if(!base)return base; const d=new Date(base);let added=0;const step=n>=0?1:-1;const abs=Math.abs(n); while(added<abs){d.setDate(d.getDate()+step);if(isWD(d))added++} return d; }
function diffWD(d1,d2){ if(!d1||!d2)return 0; let a=new Date(d1),b=new Date(d2),count=0,step=b>=a?1:-1; while(a.toDateString()!==b.toDateString()){a.setDate(a.getDate()+step);if(isWD(a))count+=step;} return count; }
function pd(s){ return s?new Date(s+'T00:00:00'):null }
function ds(d){ if(!d)return null; const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function fmtD(s){ if(!s||s==='—')return s||'—'; const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})$/); return m?`${m[2]}/${m[3]}/${m[1]}`:s; }
function parseInputDate(v){ if(!v)return null; const m1=v.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/); if(m1)return `${m1[3]}-${m1[1].padStart(2,'0')}-${m1[2].padStart(2,'0')}`; if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v; return null; }

// ══════════════════════════════════════════════════════════════════════════════
// CPM ENGINE (same logic as desktop)
// ══════════════════════════════════════════════════════════════════════════════
function parsePreds(raw){
  if(!raw||!raw.trim()||['—','None','nan'].includes(raw.trim())) return [];
  const result=[];
  for(const seg of raw.split('|')){
    const s=seg.trim(); if(!s) continue;
    const m=s.match(/^(\d+)(FS|SS|FF|SF)?([+-]\d+)?$/i);
    if(m) result.push({ id:parseInt(m[1]), rel:(m[2]||'FS').toUpperCase(), lag:m[3]?parseInt(m[3]):0 });
  }
  return result;
}

function wbsLevel(w){ if(!w||['','None','nan'].includes(w.trim()))return 3; return w.trim().split('.').length; }

function runCPMEngine(tasks, projStart, dataDate){
  const projStartD=pd(projStart), dateDateD=pd(dataDate);
  const acts=tasks.filter(t=>t.dur>0);
  const byId={};
  acts.forEach(t=>{ byId[t.id]=t; t.ES=0;t.EF=0;t.LS=0;t.LF=0;t.TF=0;t.FF=0; });
  const indeg={},adj={};
  acts.forEach(t=>{ indeg[t.id]=0; adj[t.id]=[]; });
  acts.forEach(t=>{ for(const p of (t.preds||[])){ if(!byId[p.id])continue; adj[p.id].push(t.id); indeg[t.id]=(indeg[t.id]||0)+1; } });
  const queue=[],topo=[];
  acts.forEach(t=>{ if((indeg[t.id]||0)===0)queue.push(t.id); });
  while(queue.length){ const id=queue.shift(); topo.push(id); for(const nid of (adj[id]||[])){ indeg[nid]--; if(indeg[nid]===0)queue.push(nid); } }

  topo.forEach(id=>{
    const t=byId[id];
    const hasActS=t.actualStart?true:false, hasActF=t.actualFinish?true:false;
    const actSoff=hasActS?diffWD(projStartD,pd(t.actualStart)):null;
    const actFoff=hasActF?diffWD(projStartD,pd(t.actualFinish)):null;
    if(hasActS&&hasActF){ t.ES=actSoff; t.EF=actFoff; }
    else if(hasActS){ t.ES=actSoff; t.EF=t.ES+t.dur; }
    else {
      for(const p of (t.preds||[])){ const pred=byId[p.id];if(!pred)continue; const lag=p.lag||0; switch(p.rel){ case 'FS':t.ES=Math.max(t.ES,pred.EF+lag);break; case 'SS':t.ES=Math.max(t.ES,pred.ES+lag);break; case 'FF':{const nEF=pred.EF+lag;if(nEF>t.ES+t.dur)t.ES=nEF-t.dur;break;} case 'SF':{const nEF=pred.ES+lag;if(nEF>t.ES+t.dur)t.ES=nEF-t.dur;break;} } }
      if(t.blStart){ const blOff=diffWD(projStartD,pd(t.blStart)); if(blOff>0)t.ES=Math.max(t.ES,blOff); }
      t.ES=Math.max(0,t.ES); t.EF=t.ES+t.dur;
    }
  });

  const projDur=Math.max(...acts.map(t=>t.EF));
  topo.forEach(t=>{ byId[t].LF=projDur; });
  [...topo].reverse().forEach(id=>{ const t=byId[id]; if(!(adj[id]||[]).length)t.LF=projDur; t.LS=t.LF-t.dur; for(const p of (t.preds||[])){ const pred=byId[p.id];if(!pred)continue; const lag=p.lag||0; switch(p.rel){ case 'FS':pred.LF=Math.min(pred.LF,t.LS-lag);break; case 'SS':pred.LF=Math.min(pred.LF,t.LS-lag+pred.dur);break; case 'FF':pred.LF=Math.min(pred.LF,t.LF-lag);break; case 'SF':pred.LF=Math.min(pred.LF,t.LF-lag+pred.dur);break; } } });
  topo.forEach(id=>{ const t=byId[id]; t.LS=t.LF-t.dur; t.TF=t.LF-t.EF; });

  const todayOff=diffWD(projStartD,dateDateD);
  const results=[];
  acts.forEach(t=>{
    const blStart=addWD(projStartD,t.ES);
    const blFinish=addWD(projStartD,Math.max(t.ES,t.EF-1));
    let status='Not Started';
    const actS=t.actualStart?pd(t.actualStart):null, actF=t.actualFinish?pd(t.actualFinish):null;
    if(t.pct===100)status='Complete'; else if(t.pct>0||actS)status='In Progress'; else if(actF)status='Complete';
    const schedDelay=0;
    results.push({ ...t, ES:t.ES,EF:t.EF,LS:t.LS,LF:t.LF,TF:t.TF, critical:t.TF===0,
      curStart:ds(blStart),curFinish:ds(blFinish),
      blStart:t.blStart||ds(blStart), blFinish:t.blFinish||ds(blFinish),
      schedDelay, status });
  });
  return { results, projDur, projStartD, dateDateD, topo };
}

function rollupSummaryDates(){
  const sorted=[...MS.tasks].sort((a,b)=>wbsLevel(b.wbs||'')-wbsLevel(a.wbs||''));
  sorted.forEach(t=>{
    const myWbs=t.wbs||'';
    const hasChildren=MS.tasks.some(c=>c!==t&&(c.wbs||'').startsWith(myWbs+'.'));
    if(!hasChildren)return;
    const allDesc=MS.tasks.filter(c=>{ const cw=c.wbs||''; if(!cw.startsWith(myWbs+'.'))return false; return !MS.tasks.some(x=>x!==c&&(x.wbs||'').startsWith(cw+'.')); });
    const srcTasks=allDesc.length?allDesc:MS.tasks.filter(c=>(c.wbs||'').startsWith(myWbs+'.')&&c.blStart&&c.blFinish);
    if(!srcTasks.length)return;
    const blSStrs=srcTasks.map(c=>c.blStart).filter(Boolean);
    const blFStrs=srcTasks.map(c=>c.blFinish).filter(Boolean);
    if(blSStrs.length) t.blStart=blSStrs.sort()[0];
    if(blFStrs.length) t.blFinish=[...blFStrs].sort().pop();
    if(t.blStart&&t.blFinish) t.dur=diffWD(pd(t.blStart),pd(t.blFinish))+1;
    const actSStrs=srcTasks.map(c=>c.actualStart).filter(Boolean);
    if(actSStrs.length) t.actualStart=actSStrs.sort()[0];
    const allDone=srcTasks.every(c=>c.pct===100);
    const actFStrs=srcTasks.filter(c=>c.pct===100).map(c=>c.actualFinish).filter(Boolean);
    t.actualFinish=allDone&&actFStrs.length?[...actFStrs].sort().pop():null;
    const totalW=srcTasks.reduce((s,c)=>s+(c.dur||1),0);
    t.pct=totalW>0?Math.round(srcTasks.reduce((s,c)=>s+c.pct*(c.dur||1),0)/totalW):0;
    if(srcTasks.every(c=>c.pct===100))t.status='Complete';
    else if(srcTasks.some(c=>c.pct>0||c.actualStart))t.status='In Progress';
    else t.status='Not Started';
  });
}

function runCPM(){
  if(!MS.tasks.length)return;
  const parentWbsSet=new Set();
  MS.tasks.forEach(t=>{ const p=(t.wbs||'').split('.'); for(let i=1;i<p.length;i++)parentWbsSet.add(p.slice(0,i).join('.')); });
  const isParent=t=>parentWbsSet.has(t.wbs||'');
  const acts=MS.tasks.filter(t=>!isParent(t)).map(t=>({...t,preds:parsePreds(t.predecessors)}));
  MS.results=runCPMEngine(acts,MS.settings.start,MS.settings.dataDate);
  const rMap={};
  MS.results.results.forEach(r=>rMap[r.id]=r);
  MS.tasks.forEach(t=>{ if(isParent(t))return; if(rMap[t.id]){ t.TF=rMap[t.id].TF; t.status=rMap[t.id].status; if(MS.activeBL<0){t.blStart=rMap[t.id].blStart;t.blFinish=rMap[t.id].blFinish;} } });
  rollupSummaryDates();
}

let FB={app:null,db:null,configured:false,syncId:'',listener:null};
const FB_PLATFORM='mobile';

function fbEncodeKeys(obj){
  if(typeof obj!=='object'||obj===null)return obj;
  if(Array.isArray(obj))return obj.map(fbEncodeKeys);
  const out={};
  for(const k of Object.keys(obj)){
    const ek=k.replace(/\./g,'__DOT__');
    out[ek]=fbEncodeKeys(obj[k]);
  }
  return out;
}
function fbDecodeKeys(obj){
  if(typeof obj!=='object'||obj===null)return obj;
  if(Array.isArray(obj))return obj.map(fbDecodeKeys);
  const out={};
  for(const k of Object.keys(obj)){
    const dk=k.replace(/__DOT__/g,'.');
    out[dk]=fbDecodeKeys(obj[k]);
  }
  return out;
}

function fbRef(){ return FB.db.ref('projects/'+FB.syncId); }

function fbInit(cfg){
  try{
    if(FB.app) try{FB.app.delete();}catch(e){}
    FB.app=firebase.initializeApp({apiKey:cfg.apiKey,authDomain:cfg.authDomain,databaseURL:cfg.databaseURL,projectId:cfg.projectId},'mobile-'+Date.now());
    FB.db=firebase.database(FB.app);
    FB.syncId=cfg.syncId||'default';
    FB.configured=true;
    localStorage.setItem('cpm_mobile_fb',JSON.stringify(cfg));
    return true;
  }catch(e){ console.error(e); return false; }
}

async function fbPull(){
  if(!FB.configured)return null;
  try{
    const snap=await fbRef().once('value');
    const raw=snap.val(); if(!raw)return null;
    return fbDecodeKeys(raw);
  }catch(e){ toast('Pull ล้มเหลว: '+e.message,'error'); return null; }
}

async function fbPush(){
  if(!FB.configured)return;
  const raw={
    settings:MS.settings, tasks:MS.tasks,
    baselines:MS.baselines, activeBL:MS.activeBL,
    meta:{ lastUpdated:new Date().toISOString(), updatedBy:FB_PLATFORM, projectName:MS.settings.name||'' }
  };
  try{ await fbRef().set(fbEncodeKeys(raw)); toast('☁ Push สำเร็จ','success'); }
  catch(e){ toast('Push ล้มเหลว','error'); }
}

function fbStartListen(){
  if(!FB.configured)return;
  if(FB.listener)fbRef().off('value',FB.listener);
  FB.listener=fbRef().on('value',snap=>{
    const data=snap.val(); if(!data)return;
    if(data.meta&&data.meta.updatedBy===FB_PLATFORM)return;
    applyData(fbDecodeKeys(data));
    toast('☁ รับข้อมูลจาก Desktop','success');
  });
}

function applyData(data){
  if(!data)return;
  MS.settings={...MS.settings,...(data.settings||{})};
  MS.tasks=data.tasks||[];
  MS.baselines=data.baselines||[];
  MS.activeBL=data.activeBL??-1;
  runCPM();
  renderAll();
  updateTopbar();
}

function updateTopbar(){
  document.getElementById('m-proj').textContent=MS.settings.name||'No project';
  document.getElementById('m-date').textContent='DD: '+fmtD(MS.settings.dataDate);
  document.getElementById('m-datadate-input').value=fmtD(MS.settings.dataDate)||'';

  if(info) info.innerHTML=`<div>📁 <b>${MS.settings.name||'—'}</b></div><div>👤 ${MS.settings.pm||'—'}</div><div>📅 Start: ${fmtD(MS.settings.start)}</div><div>📊 Data Date: ${fmtD(MS.settings.dataDate)}</div><div>🕐 ${MS.settings.wdays||5} วัน/สัปดาห์</div>`;
}

function renderAll(){ renderDash(); renderTaskList(); }

function renderDash(){
  if(!MS.results){ document.getElementById('m-kpi').innerHTML='<div class="kpi-box" style="grid-column:1/-1"><div class="kl">สถานะ</div><div class="kv" style="font-size:14px">Pull ข้อมูลจาก Desktop ก่อน</div></div>'; return; }
  const {results,projDur}=MS.results;
  const leafResults=results.filter(r=>r.dur>0);
  const total=leafResults.length;
  const done=leafResults.filter(r=>r.pct===100).length;
  const inprog=leafResults.filter(r=>r.pct>0&&r.pct<100).length;
  const crit=leafResults.filter(r=>r.critical).length;
  const avgPct=total?Math.round(leafResults.reduce((s,r)=>s+r.pct*(r.dur||1),0)/leafResults.reduce((s,r)=>s+(r.dur||1),0)):0;

  document.getElementById('m-kpi').innerHTML=`
    <div class="kpi-box accent"><div class="kl">Activities</div><div class="kv">${total}</div><div style="font-size:10px;color:var(--txt3)">${done} done · ${inprog} in prog</div></div>
    <div class="kpi-box red"><div class="kl">Critical</div><div class="kv">${crit}</div><div style="font-size:10px;color:var(--txt3)">tasks on CP</div></div>
    <div class="kpi-box green"><div class="kl">Actual %</div><div class="kv">${avgPct}%</div></div>
    <div class="kpi-box gold"><div class="kl">Proj Duration</div><div class="kv">${projDur}</div><div style="font-size:10px;color:var(--txt3)">working days</div></div>`;

  // Ring
  const circ=257.6;
  const fill=document.getElementById('m-ring-fill');
  const lbl=document.getElementById('m-ring-pct');
  if(fill){ fill.style.strokeDashoffset=circ*(1-avgPct/100); fill.style.stroke=avgPct===100?'var(--green)':avgPct>50?'var(--accent)':'var(--amber)'; }
  if(lbl) lbl.textContent=avgPct+'%';
  const detail=document.getElementById('m-progress-detail');
  if(detail) detail.innerHTML=`<div style="color:var(--txt3)">Done: <b style="color:var(--green)">${done}</b></div><div style="color:var(--txt3)">In Progress: <b style="color:var(--accent)">${inprog}</b></div><div style="color:var(--txt3)">Not Started: <b>${total-done-inprog}</b></div><div style="color:var(--txt3)">Critical: <b style="color:var(--red)">${crit}</b></div>`;

  // CP strip
  const cpIds=MS.results.topo.filter(id=>results.find(r=>r.id===id&&r.critical));
  document.getElementById('m-cp').innerHTML=`<strong>★ Critical Path (${cpIds.length} tasks)</strong>${cpIds.slice(0,8).join(' → ')}${cpIds.length>8?` … +${cpIds.length-8}`:''}`;

  // Phase summary
  const phGroups={};
  MS.tasks.filter(t=>wbsLevel(t.wbs||'')==1).forEach(t=>{ phGroups[t.wbs]={name:t.name,tasks:[],durSum:0,pctWt:0}; });
  leafResults.forEach(r=>{ const l1=(r.wbs||'').split('.')[0]; if(phGroups[l1]){phGroups[l1].tasks.push(r);phGroups[l1].durSum+=(r.dur||1);phGroups[l1].pctWt+=r.pct*(r.dur||1);} });
  const phHtml=Object.entries(phGroups).map(([k,g])=>{
    if(!g.tasks.length)return '';
    const pct=g.durSum?Math.round(g.pctWt/g.durSum):0;
    const col=pct===100?'var(--green)':pct>0?'var(--accent)':'var(--line2)';
    return `<div class="card" style="padding:10px 12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
        <span style="font-size:12px;font-weight:600">${g.name}</span>
        <span style="font-family:var(--mono);font-size:11px;font-weight:700;color:${col}">${pct}%</span>
      </div>
      <div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${col}"></div></div>
      <div style="font-family:var(--mono);font-size:9px;color:var(--txt3);margin-top:4px">${g.tasks.filter(t=>t.pct===100).length}/${g.tasks.length} tasks done</div>
    </div>`;
  }).join('');
  document.getElementById('m-phase-list').innerHTML=phHtml||'<div style="color:var(--txt3);font-size:12px;padding:12px">ยังไม่มีข้อมูล</div>';
}

let _taskFilter='all';
function mFilterTasks(f,el){
  _taskFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderTaskList();
}

function renderTaskList(){
  const el=document.getElementById('m-task-list');
  if(!MS.tasks.length){ el.innerHTML='<div style="color:var(--txt3);font-size:12px;padding:20px;text-align:center">ยังไม่มีข้อมูล</div>'; return; }
  const rMap={};
  if(MS.results) MS.results.results.forEach(r=>rMap[r.id]=r);
  let tasks=MS.tasks;
  if(_taskFilter==='critical') tasks=tasks.filter(t=>rMap[t.id]?.critical);
  if(_taskFilter==='inprog') tasks=tasks.filter(t=>rMap[t.id]?.status==='In Progress'||t.status==='In Progress');
  if(_taskFilter==='delayed') tasks=tasks.filter(t=>rMap[t.id]?.schedDelay>0);
  if(_taskFilter==='notstarted') tasks=tasks.filter(t=>t.status==='Not Started'||(rMap[t.id]?.status==='Not Started'));
  const parentSet=new Set();
  MS.tasks.forEach(t=>{ const p=(t.wbs||'').split('.'); for(let i=1;i<p.length;i++)parentSet.add(p.slice(0,i).join('.')); });

  el.innerHTML=tasks.map((t,rawIdx)=>{
    const r=rMap[t.id];
    const lv=wbsLevel(t.wbs||'');
    const isSum=parentSet.has(t.wbs||'');
    const isCrit=r?.critical;
    const pct=t.pct||0;
    const idx=MS.tasks.indexOf(t);
    const cls=isSum?(lv===1?'lv1':'lv2'):isCrit?'crit':'';
    const pfx=isSum?(lv===1?'▐ ':'  ▾ '):(lv===2?'  ▸ ':'    ');
    const statusCol=pct===100?'var(--green)':pct>0?'var(--amber)':'var(--txt3)';
    const tfHtml=r&&!isSum?`<span class="badge ${r.TF===0?'red':r.TF<=5?'amber':'grey'}">${r.TF}d</span>`:'';
    const statBadge=t.status?`<span class="badge ${{Complete:'green','In Progress':'blue','Not Started':'grey'}[t.status]||'grey'}">${t.status}</span>`:'';
    return `<div class="task-item ${cls}" onclick="openEdit(${idx})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
        <div class="task-name ${isCrit?'crit':''}">${pfx}${t.name||'—'}</div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--txt3);flex-shrink:0">${t.id}</span>
      </div>
      <div class="task-meta">
        <span>WBS: ${t.wbs||'—'}</span><span>Dur: ${t.dur||0}d</span>
        ${tfHtml} ${statBadge}
        ${isCrit?'<span class="badge crit">★ CP</span>':''}
      </div>
      <div class="task-dates">
        <div class="dl"><div class="lb">Start</div><div class="vl">${fmtD(t.blStart)||'—'}</div></div>
        <div class="dl"><div class="lb">Finish</div><div class="vl">${fmtD(t.blFinish)||'—'}</div></div>
        <div class="dl"><div class="lb">Act.Start</div><div class="vl" style="color:var(--green)">${fmtD(t.actualStart)||'—'}</div></div>
        <div class="dl"><div class="lb">Act.Finish</div><div class="vl" style="color:var(--green)">${fmtD(t.actualFinish)||'—'}</div></div>
      </div>
      ${!isSum?`<div><div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;margin-bottom:3px"><span style="color:var(--txt3)">Progress</span><span style="color:${statusCol};font-weight:600">${pct}%</span></div><div class="pct-bar"><div class="pct-fill" style="width:${pct}%;background:${statusCol}"></div></div></div>`:''}
    </div>`;
  }).join('');
}

function openEdit(idx){
  MS.editIdx=idx;
  const t=MS.tasks[idx];
  document.getElementById('edit-title').textContent=`✏️ ${t.id} — ${t.name}`;
  document.getElementById('e-pct').value=t.pct||0;
  document.getElementById('e-as').value=fmtD(t.actualStart)||'';
  document.getElementById('e-af').value=fmtD(t.actualFinish)||'';
  document.getElementById('e-status').value=t.status||'Not Started';
  // BL info
  const blCard=document.getElementById('edit-bl-card');
  const blHd=document.getElementById('edit-bl-hd');
  blCard.style.display='block'; blHd.style.display='block';
  blCard.innerHTML=`Plan Start: <b>${fmtD(t.blStart)||'—'}</b><br>Plan Finish: <b>${fmtD(t.blFinish)||'—'}</b><br>Duration: <b>${t.dur||0} วันทำงาน</b><br>WBS: <b>${t.wbs||'—'}</b><br>Predecessor: <b>${t.predecessors||'—'}</b>`;
  showPage('edit',document.querySelectorAll('.nav-btn')[2]);
}

function cancelEdit(){
  MS.editIdx=-1;
  showPage('tasks',document.querySelectorAll('.nav-btn')[1]);
}

function saveEdit(){
  if(MS.editIdx<0){ toast('ยังไม่ได้เลือกงาน','error'); return; }
  const t=MS.tasks[MS.editIdx];
  t.pct=Math.max(0,Math.min(100,parseInt(document.getElementById('e-pct').value)||0));
  t.actualStart=parseInputDate(document.getElementById('e-as').value)||null;
  t.actualFinish=parseInputDate(document.getElementById('e-af').value)||null;
  t.status=document.getElementById('e-status').value;
  if(t.actualStart&&t.actualFinish&&t.pct<100) t.pct=100;
  runCPM(); renderAll();
  fbPush();
  toast('💾 บันทึกแล้ว','success');
}

function updateDataDate(){
  const v=parseInputDate(document.getElementById('m-datadate-input').value);
  if(!v){ toast('รูปแบบวันที่ผิด (MM/DD/YYYY)','error'); return; }
  MS.settings.dataDate=v;
  updateTopbar(); runCPM(); renderAll(); fbPush();
  toast('Data Date: '+fmtD(v),'success');
}

// ══════════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(btn) btn.classList.add('active');
}

function toast(msg,type='success'){
  const el=document.getElementById('toast-m');
  el.textContent=msg; el.className='show '+(type||'');
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='',2500);
}

function openCloudSheet(){
  const cfg=JSON.parse(localStorage.getItem('cpm_mobile_fb')||'{}');
  document.getElementById('fb-apiKey').value=cfg.apiKey||'';
  document.getElementById('fb-authDomain').value=cfg.authDomain||'';
  document.getElementById('fb-dbUrl').value=cfg.databaseURL||'';
  document.getElementById('fb-projId').value=cfg.projectId||'';
  document.getElementById('fb-syncId').value=cfg.syncId||FB.syncId||'';
  document.getElementById('cloud-sheet-status').textContent=FB.configured?`✓ เชื่อมต่อแล้ว · ${FB.syncId}`:'';
  document.getElementById('cloud-overlay').classList.add('open');
}
function closeCloudSheet(){ document.getElementById('cloud-overlay').classList.remove('open'); }

async function fbConnectMobile(){
  const cfg={
    apiKey:document.getElementById('fb-apiKey').value.trim(),
    authDomain:document.getElementById('fb-authDomain').value.trim(),
    databaseURL:document.getElementById('fb-dbUrl').value.trim(),
    projectId:document.getElementById('fb-projId').value.trim(),
    syncId:(document.getElementById('fb-syncId').value.trim().replace(/[^a-zA-Z0-9\-_]/g,'')||'default')
  };
  if(!cfg.databaseURL){ toast('ใส่ Database URL ก่อน','error'); return; }
  if(!fbInit(cfg)){ toast('เชื่อมต่อไม่ได้','error'); return; }
  document.getElementById('cloud-sheet-status').textContent='⏳ กำลัง Pull...';
  const data=await fbPull();
  if(data){ applyData(data); document.getElementById('cloud-sheet-status').textContent=`✓ Pull สำเร็จ · ${(data.tasks||[]).length} tasks`; }
  fbStartListen();
  updateCloudStatus();
  closeCloudSheet();
  toast('🔌 เชื่อมต่อสำเร็จ','success');
}

function updateCloudStatus(){
  const el=document.getElementById('m-cloud-status');
  if(!el)return;
  el.innerHTML=FB.configured
    ?`<span style="color:var(--green)">✓ เชื่อมต่อแล้ว</span><br>Sync ID: <b>${FB.syncId}</b><br>🟢 Auto-sync ON`
    :'ยังไม่ได้เชื่อมต่อ — กด ตั้งค่า Firebase';
}

// ══════════════════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════════════════
(function init(){
  const cfg=JSON.parse(localStorage.getItem('cpm_mobile_fb')||'null');
  if(cfg&&cfg.databaseURL){
    fbInit(cfg);
    fbPull().then(data=>{ if(data){ applyData(data); fbStartListen(); updateCloudStatus(); } });
  }
  updateTopbar();
})();
</script>

<script>
// Inline Service Worker via Blob URL — no sw.js file needed
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='cpm-mobile-v26';
    const ASSETS=[self.location.pathname];
    self.addEventListener('install',e=>{ e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))); self.skipWaiting(); });
    self.addEventListener('activate',e=>{ e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))); self.clients.claim(); });
    self.addEventListener('fetch',e=>{ e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))); });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(r=>{
    console.log('SW (inline) registered:', r.scope);
  }).catch(e=>console.log('SW error:',e));
}
</script>
